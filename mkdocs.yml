site_name: SeCuReDmE cPanel API Surface Test Lab
site_description: Public documentation for SecuredMe cPanel operator API surface tests.
site_url: https://securedme-main-dev.github.io/test/
repo_url: https://github.com/SeCuReDmE-main-dev/test
repo_name: SeCuReDmE-main-dev/test
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: assets/securedme-mark.svg
  favicon: assets/securedme-mark.svg
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: red
      accent: blue
    - scheme: slate
      primary: red
      accent: cyan

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

nav:
  - Home: index.md
  - Wiki:
      - Wiki Home: wiki/index.md
      - Navigation Map: wiki/navigation-map.md
      - Documentation Standard: wiki/documentation-standard.md
      - GitHub Wiki Hosting: wiki/github-wiki-hosting.md
  - Personal Test Docs:
      - SecuredMe Personal Test Docs: personal/index.md
      - cPanel Operator Lab Notes: personal/cpanel-operator-lab.md
  - Tests:
      - Test Index: tests/index.md
      - "001: cPanel Subdomain Creation": tests/001-cpanel-subdomain-create.md
  - API Surface:
      - Overview: api-surface/index.md
      - cPanel UAPI: api-surface/cpanel-uapi.md
      - Domains And DNS: api-surface/domains-dns.md
      - Email And SSL: api-surface/email-ssl.md
      - Deployment Planning: api-surface/deployment-planning.md
  - Runbooks:
      - Public Test Protocol: runbooks/public-test-protocol.md
      - Live Mutation Gate: runbooks/live-mutation-gate.md
      - Result Capture Template: runbooks/result-capture-template.md
  - Security:
      - Redaction Policy: security/redaction-policy.md
      - Public Boundary: security/public-boundary.md
  - Status:
      - Current State: status/current-state.md
      - Roadmap: status/roadmap.md
  - Decisions:
      - "0001: Documentation Stack": decisions/0001-documentation-stack.md
