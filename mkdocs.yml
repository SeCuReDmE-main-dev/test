site_name: SecuredMe Education Preview
site_description: Public-safe preview lab for the SecuredMe Education hub.
site_url: https://securedme-main-dev.github.io/test/

theme:
  name: material
  language: en
  custom_dir: overrides
  logo: assets/education/education-icon.png
  favicon: assets/education/education-icon.png
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark Education mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light Education mode

extra_css:
  - stylesheets/securedme-education.css
  - stylesheets/securedme-theme-toggle.css
  - stylesheets/securedme-accessibility.css
  - stylesheets/securedme-central.css

extra_javascript:
  - javascripts/securedme-theme-toggle.js
  - javascripts/securedme-accessibility.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

nav:
  - Home: index.md
  - Tools:
      - Overview: tools/index.md
      - AlgoQuest Discovery Labs: algoquest.md
      - Algorithm Builder: algorithm-builder.md
      - CeLeBrUm Learning Lab: celebrum-learning-lab.md
      - FFeD QLC: ffed-qlc.md
      - FNP-QNN MVP: fnp-qnn-mvp.md
      - Hippo Memory Learning: hippo-memory-learning.md
      - Market Guardian: market-guardian.md
      - QuaNThoR: quanthor.md
      - SCL License: scl-license.md
      - SecuredMe Scholarium: scholarium.md
      - Synthia: synthia.md
      - Tesla Recovery Workbench: tesla-recovery-workbench.md
      - V.O.T Guardian: vot-guardian.md
      - Visual Algorithm Designer: visual-algorithm-designer.md
  - 40 Starter Prompts: starter-prompts/index.md
  - Notebook / Colab: notebooks/index.md
  - Accessibility:
      - Access Console: accessibility/edge-user-console.md
      - Comfort Modes: accessibility/neurodivergent-comfort.md
