site_name: SecuredMe Education Preview
site_description: A simplified transition page for the SecuredMe Education public hub.
site_url: https://securedme-main-dev.github.io/test/

theme:
  name: material
  language: en
  custom_dir: overrides
  logo: assets/education/education-icon.png
  favicon: assets/education/education-icon.png
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark Education mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light Education mode

extra_css:
  - stylesheets/securedme-education.css
  - stylesheets/securedme-theme-toggle.css
  - stylesheets/securedme-accessibility.css

extra_javascript:
  - javascripts/securedme-theme-toggle.js
  - javascripts/securedme-accessibility.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

nav:
  - Home: index.md
